services:
  # ── 本地开发服务 ──

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./services/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  # ── 全容器部署（可选）──

  devkit:
    build: .
    env_file: .env
    ports:
      - "${OPENCAMI_PORT:-3000}:${OPENCAMI_PORT:-3000}"
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
      - "${STT_PROXY_PORT:-8787}:${STT_PROXY_PORT:-8787}"
    volumes:
      - openclaw-data:/root/.openclaw
    restart: unless-stopped
    profiles: [deploy]

volumes:
  openclaw-data:
