services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./implementation/services/search/settings.yml:/etc/searxng/settings.yml:ro
    dns:
      - 223.5.5.5
      - 8.8.8.8
    environment:
      - SEARXNG_SECRET=devkit-searxng-2026
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  devkit:
    build: .
    env_file: .env
    ports:
      - "${VOICE_CHAT_PORT:-3001}:${VOICE_CHAT_PORT:-3001}"
      - "${STT_PROXY_PORT:-8787}:${STT_PROXY_PORT:-8787}"
    restart: unless-stopped
    profiles: [deploy]
