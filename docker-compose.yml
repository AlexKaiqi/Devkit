services:
  # ── 本地开发服务 ──

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "8080:8080"
    volumes:
      - ./services/searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  # ── 全容器部署（可选）──

  devkit:
    build: .
    env_file: .env
    ports:
      - "${VOICE_CHAT_PORT:-3001}:${VOICE_CHAT_PORT:-3001}"
      - "${STT_PROXY_PORT:-8787}:${STT_PROXY_PORT:-8787}"
    restart: unless-stopped
    profiles: [deploy]
