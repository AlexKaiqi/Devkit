# Neo4j 5 Community Edition for Task Graph storage.
# Managed by start.sh / stop.sh.

services:
  neo4j:
    image: neo4j:5-community
    container_name: devkit-neo4j
    ports:
      - "${NEO4J_BOLT_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-devkit2026}
      - NEO4J_PLUGINS=[]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
