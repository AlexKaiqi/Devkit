<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>风铃 · 希露菲</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#35a5d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script src="/static/marked.min.js"></script>
<style>
  :root {
    --bg: #eef6fb;
    --surface: rgba(255, 255, 255, 0.75);
    --surface-2: rgba(255, 255, 255, 0.55);
    --text: #1e3040;
    --text-dim: #6b8fa8;
    --accent: #35a5d8;
    --accent-2: #4cc9a0;
    --accent-glow: rgba(53, 165, 216, 0.25);
    --user-bubble: #d6eef9;
    --user-text: #1a3a52;
    --ai-bubble: rgba(255, 255, 255, 0.88);
    --recording: #f06080;
    --recording-glow: rgba(240, 96, 128, 0.35);
    --border: rgba(53, 165, 216, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: linear-gradient(160deg, #d6eef9 0%, #e8f5f0 50%, #eef6fb 100%);
    background-attachment: fixed;
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header, #controls, .side-btn, #mic-btn, #text-send-btn, .hint, .voice-select {
    -webkit-user-select: none;
    user-select: none;
  }

  header {
    position: relative;
    padding: 14px 20px;
    text-align: center;
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    box-shadow: 0 1px 12px rgba(53, 165, 216, 0.08);
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  header h1 span { color: var(--accent); }

  header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.55;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #5bb8e8, #35a5d8);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: 0 2px 12px rgba(53, 165, 216, 0.28);
  }

  .msg.ai {
    align-self: flex-start;
    background: var(--ai-bubble);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom-left-radius: 4px;
    border-left: 2.5px solid var(--accent-2);
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.07);
  }

  .msg.ai .typing {
    display: block;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .msg.ai .typing::after {
    content: '▍';
    animation: blink 0.8s step-end infinite;
    color: var(--accent);
  }

  .msg.ai .typing .cursor {
    animation: blink 0.8s step-end infinite;
    color: var(--accent);
  }
  @keyframes blink {
    50% { opacity: 0; }
  }

  .msg .attachment {
    margin-top: 8px;
    background: rgba(238, 246, 251, 0.85);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-x: auto;
    border: 1px solid var(--border);
    position: relative;
  }

  .msg .attachment .att-label {
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: -apple-system, sans-serif;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .msg .attachment .copy-btn {
    position: absolute;
    top: 4px;
    right: 48px;
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--surface-2);
    border-radius: 4px;
    padding: 1px 6px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }

  .msg .attachment .copy-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    padding: 4px 8px;
  }

  .msg.notify {
    align-self: flex-start;
    background: rgba(255, 243, 205, 0.88);
    border-left: 2.5px solid #f4c430;
    border-radius: 12px 12px 12px 4px;
    box-shadow: 0 2px 10px rgba(244, 196, 48, 0.18);
    color: var(--text);
    font-size: 14px;
    max-width: 72%;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .tool-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(53, 165, 216, 0.10);
    border: 1px solid rgba(53, 165, 216, 0.2);
    font-size: 12px;
    color: var(--accent);
    margin: 4px 0;
    animation: fadeIn 0.25s ease;
  }

  .tool-indicator::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease infinite;
  }

  #controls {
    flex-shrink: 0;
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
    background: rgba(255, 255, 255, 0.72);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  #status {
    font-size: 13px;
    color: var(--text-dim);
    height: 20px;
    transition: color 0.2s;
  }

  #status.recording { color: var(--recording); }
  #status.processing { color: var(--accent); }

  #mic-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #5bb8e8, #35a5d8);
    color: white;
    font-size: 32px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px var(--accent-glow);
    touch-action: none;
    position: relative;
  }

  #mic-btn:active, #mic-btn.recording {
    background: linear-gradient(135deg, #f07898, var(--recording));
    box-shadow: 0 4px 30px var(--recording-glow);
    transform: scale(1.1);
  }

  #mic-btn.recording::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid var(--recording);
    animation: pulse 1.2s ease infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  #mic-btn:disabled {
    background: #c8dde8;
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  #mic-btn svg {
    width: 32px;
    height: 32px;
    fill: currentColor;
    pointer-events: none;
  }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  .header-actions {
    position: absolute;
    top: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .header-actions.left { left: 16px; }
  .header-actions.right { right: 16px; }

  .header-btn {
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    backdrop-filter: blur(8px);
  }

  .header-btn:hover { color: var(--accent); border-color: var(--accent); background: rgba(255,255,255,0.9); }

  .voice-select {
    position: static;
  }

  .voice-select select {
    background: rgba(255,255,255,0.7);
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }

  .msg img.chat-img {
    max-width: 100%;
    max-height: 240px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
  }

  #preview-strip {
    display: none;
    padding: 8px 20px 0;
    gap: 8px;
    flex-wrap: wrap;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    align-items: center;
  }

  #preview-strip.active { display: flex; }

  .preview-thumb {
    position: relative;
    width: 56px; height: 56px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .preview-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .preview-thumb .remove-btn {
    position: absolute;
    top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  #btn-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .side-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.7);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .side-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .side-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  #text-row {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 0 20px;
  }

  #text-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.85);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  #text-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(53, 165, 216, 0.12);
  }

  #text-input::placeholder { color: var(--text-dim); }

  #text-send-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #5bb8e8, #35a5d8);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
    box-shadow: 0 2px 8px var(--accent-glow);
  }

  #text-send-btn:hover { transform: scale(1.08); box-shadow: 0 4px 16px var(--accent-glow); }
  #text-send-btn:disabled { background: #c8dde8; box-shadow: none; cursor: not-allowed; transform: none; }

  #stop-btn {
    display: none;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #f07898, var(--recording));
    color: white;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 4px 20px var(--recording-glow);
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    animation: fadeIn 0.25s ease;
  }

  #stop-btn:hover { transform: scale(1.08); }

  #stop-btn svg {
    width: 28px;
    height: 28px;
    fill: currentColor;
    pointer-events: none;
  }

  @media (max-width: 480px) {
    #mic-btn { width: 72px; height: 72px; }
    .msg { max-width: 88%; font-size: 14px; }
    .side-btn { width: 38px; height: 38px; font-size: 17px; }
  }

  /* ── Markdown body in AI messages ──────────── */

  .msg.ai .markdown-body {
    font-size: 15px;
    line-height: 1.65;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  .msg.ai .markdown-body p {
    margin: 0 0 8px;
  }

  .msg.ai .markdown-body p:last-child {
    margin-bottom: 0;
  }

  .msg.ai .markdown-body ul,
  .msg.ai .markdown-body ol {
    margin: 4px 0 8px;
    padding-left: 20px;
  }

  .msg.ai .markdown-body li {
    margin-bottom: 3px;
  }

  .msg.ai .markdown-body li > p {
    margin-bottom: 2px;
  }

  .msg.ai .markdown-body h1,
  .msg.ai .markdown-body h2,
  .msg.ai .markdown-body h3,
  .msg.ai .markdown-body h4 {
    font-weight: 600;
    margin: 12px 0 6px;
    color: var(--text);
  }
  .msg.ai .markdown-body h1 { font-size: 18px; }
  .msg.ai .markdown-body h2 { font-size: 16px; }
  .msg.ai .markdown-body h3 { font-size: 15px; }

  .msg.ai .markdown-body strong {
    font-weight: 600;
    color: var(--text);
  }

  .msg.ai .markdown-body em {
    color: var(--text-dim);
  }

  .msg.ai .markdown-body code {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    padding: 1px 5px;
    background: rgba(53, 165, 216, 0.08);
    border: 1px solid rgba(53, 165, 216, 0.2);
    border-radius: 3px;
    color: #1a7aaa;
  }

  .msg.ai .markdown-body pre {
    position: relative;
    margin: 8px 0;
    padding: 10px 12px;
    background: #f0f7fb;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow-x: auto;
  }

  .msg.ai .markdown-body pre code {
    padding: 0;
    background: none;
    border: none;
    color: var(--text);
    font-size: 13px;
    line-height: 1.5;
  }

  .msg.ai .markdown-body pre .code-copy-btn {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 11px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.8);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 8px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
    opacity: 0;
    transition: opacity 0.15s;
  }

  .msg.ai .markdown-body pre:hover .code-copy-btn {
    opacity: 1;
  }

  .msg.ai .markdown-body pre .code-copy-btn:hover {
    color: var(--accent);
    border-color: var(--accent);
  }

  .msg.ai .markdown-body pre .code-lang-label {
    position: absolute;
    top: 6px;
    right: 56px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: -apple-system, sans-serif;
    text-transform: uppercase;
    opacity: 0.5;
  }

  .msg.ai .markdown-body blockquote {
    margin: 6px 0;
    padding: 4px 12px;
    border-left: 3px solid var(--accent-2);
    background: rgba(76, 201, 160, 0.08);
    color: var(--text-dim);
  }

  .msg.ai .markdown-body a {
    color: var(--accent);
    text-decoration: none;
  }

  .msg.ai .markdown-body a:hover {
    text-decoration: underline;
  }

  .msg.ai .markdown-body table {
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 13px;
    width: 100%;
  }

  .msg.ai .markdown-body th,
  .msg.ai .markdown-body td {
    padding: 5px 10px;
    border: 1px solid var(--border);
    text-align: left;
  }

  .msg.ai .markdown-body th {
    background: rgba(53, 165, 216, 0.08);
    font-weight: 600;
  }

  .msg.ai .markdown-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 10px 0;
  }

  .msg.ai .markdown-body img {
    max-width: 100%;
    border-radius: 8px;
  }

  /* Mermaid diagrams */
  .msg.ai .markdown-body .mermaid-container {
    margin: 8px 0;
    padding: 12px;
    background: rgba(255,255,255,0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow-x: auto;
    text-align: center;
  }

  .msg.ai .markdown-body .mermaid-container svg {
    max-width: 100%;
  }

  /* ── Task card in chat ─────────────────────── */

  .task-card {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 4px 0;
    padding: 8px 12px;
    background: rgba(255,255,255,0.75);
    border-radius: 10px;
    border-left: 3px solid var(--accent-2);
    cursor: pointer;
    transition: background 0.15s;
    animation: fadeIn 0.25s ease;
    font-size: 13px;
  }

  .task-card:hover {
    background: rgba(255,255,255,0.95);
  }

  .task-card .task-card-icon {
    font-size: 14px;
    flex-shrink: 0;
  }

  .task-card .task-card-title {
    flex: 1;
    color: var(--text);
  }

  .task-card .task-card-arrow {
    color: var(--text-dim);
    font-size: 12px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <div class="header-actions left">
    <button class="header-btn" id="clear-btn" title="清空对话">清空</button>
  </div>
  <h1>🎐 <span>风铃</span></h1>
  <div class="subtitle">语音问语音答 · 打字问文字答</div>
  <div class="header-actions right">
    <div class="voice-select"><select id="voice-picker"></select></div>
    <button class="header-btn" id="push-btn" title="开启推送通知">🔕</button>
  </div>
</header>

<div id="chat"></div>

<div id="preview-strip"></div>

<div id="controls">
  <div id="text-row">
    <button class="side-btn" id="attach-btn" aria-label="添加图片/视频" title="添加图片或视频">📎</button>
    <input type="text" id="text-input" placeholder="输入文字..." autocomplete="off">
    <button id="text-send-btn" disabled aria-label="发送文字">➤</button>
  </div>
  <div id="status">准备就绪</div>
  <div id="btn-row">
    <button id="mic-btn" aria-label="按住说话">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button id="stop-btn" aria-label="停止">
      <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
    </button>
  </div>
  <div class="hint">空格说话 · Enter 发送 · Esc 停止</div>
  <input type="file" id="file-input" accept="image/*,video/*" multiple hidden>
</div>

<script>
const chatEl = document.getElementById('chat');
const micBtn = document.getElementById('mic-btn');
const stopBtn = document.getElementById('stop-btn');
const clearBtn = document.getElementById('clear-btn');
const statusEl = document.getElementById('status');
const voicePicker = document.getElementById('voice-picker');
const attachBtn = document.getElementById('attach-btn');
const textInput = document.getElementById('text-input');
const textSendBtn = document.getElementById('text-send-btn');
const fileInput = document.getElementById('file-input');
const previewStrip = document.getElementById('preview-strip');
const sessionId = sessionStorage.getItem('fenglingSession') || crypto.randomUUID();
sessionStorage.setItem('fenglingSession', sessionId);

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let currentAudio = null;
let pendingImages = [];
let abortController = null;
let isGenerating = false;
let chatHistory = JSON.parse(sessionStorage.getItem('fenglingHistory') || '[]');

function addMsg(text, role, images = [], save = true) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  for (const src of images) {
    const img = document.createElement('img');
    img.src = src;
    img.className = 'chat-img';
    img.addEventListener('click', () => window.open(src, '_blank'));
    div.appendChild(img);
  }
  if (text) {
    if (role === 'ai' || role === 'notify') {
      renderStructured(div, text);
    } else {
      const p = document.createElement('p');
      p.style.margin = '0';
      p.textContent = text;
      div.appendChild(p);
    }
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  if (save && text) {
    chatHistory.push({ text, role, images: images.length > 0 ? images : undefined });
    saveChatHistory();
  }
  return div;
}

function saveChatHistory() {
  try {
    const toSave = chatHistory.slice(-100);
    sessionStorage.setItem('fenglingHistory', JSON.stringify(toSave));
  } catch {}
}

function setStatus(text, cls = '') {
  statusEl.textContent = text;
  statusEl.className = cls;
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, {
      mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus' : 'audio/webm'
    });

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.start(100);
    isRecording = true;
    micBtn.classList.add('recording');
    setStatus('🔴 正在录音...', 'recording');
  } catch (err) {
    setStatus('麦克风权限被拒绝', '');
    console.error('Mic error:', err);
  }
}

async function stopRecording() {
  if (!mediaRecorder || !isRecording) return;

  return new Promise(resolve => {
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder = null;
      isRecording = false;
      micBtn.classList.remove('recording');

      if (blob.size < 1000) {
        setStatus('录音太短，请重试', '');
        resolve();
        return;
      }

      await processAudio(blob);
      resolve();
    };
    mediaRecorder.stop();
  });
}

// Sentence splitter: split on Chinese/English sentence-ending punctuation
const SENTENCE_RE = /[。！？；\n\.!\?;]+/;

function splitSentences(text) {
  const parts = [];
  let rest = text;
  while (rest.length > 0) {
    const m = rest.match(SENTENCE_RE);
    if (!m) break;
    const end = m.index + m[0].length;
    parts.push(rest.slice(0, end));
    rest = rest.slice(end);
  }
  if (rest.trim()) parts.push(rest);
  return parts;
}

// TTS audio queue: play segments sequentially
let ttsQueue = [];
let ttsPlaying = false;

async function enqueueTTS(text) {
  ttsQueue.push(text);
  if (!ttsPlaying) drainTTSQueue();
}

async function drainTTSQueue() {
  ttsPlaying = true;
  while (ttsQueue.length > 0) {
    const text = ttsQueue.shift();
    try {
      await playOneTTS(text);
    } catch (err) {
      console.error('TTS segment error:', err);
    }
  }
  ttsPlaying = false;
}

// Streaming TTS: fetch /api/tts/stream and feed MP3 chunks into MediaSource progressively.
// Falls back to buffered /api/tts if MediaSource is unavailable.
async function playOneTTS(text) {
  const voice = voicePicker.value;

  // Try streaming via MediaSource (supported in Chrome/Edge desktop + Android Chrome)
  if (typeof MediaSource !== 'undefined' && MediaSource.isTypeSupported('audio/mpeg')) {
    await playOneStreamingTTS(text, voice);
    return;
  }

  // Fallback: buffer the whole response then play
  const res = await fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, voice }),
  });
  if (!res.ok) return;

  const audioBlob = await res.blob();
  const url = URL.createObjectURL(audioBlob);
  currentAudio = new Audio(url);
  await new Promise((resolve) => {
    currentAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
    currentAudio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
    currentAudio.play().catch(resolve);
  });
  currentAudio = null;
}

async function playOneStreamingTTS(text, voice) {
  const ms = new MediaSource();
  const url = URL.createObjectURL(ms);
  currentAudio = new Audio(url);

  await new Promise((resolve) => {
    ms.addEventListener('sourceopen', resolve, { once: true });
    currentAudio.play().catch(() => {});
  });

  let sb;
  try {
    sb = ms.addSourceBuffer('audio/mpeg');
  } catch (e) {
    // MediaSource doesn't support audio/mpeg on this device; fallback
    URL.revokeObjectURL(url);
    currentAudio = null;
    const res = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, voice }),
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const u2 = URL.createObjectURL(blob);
    currentAudio = new Audio(u2);
    await new Promise((resolve) => {
      currentAudio.onended = () => { URL.revokeObjectURL(u2); resolve(); };
      currentAudio.onerror = () => { URL.revokeObjectURL(u2); resolve(); };
      currentAudio.play().catch(resolve);
    });
    currentAudio = null;
    return;
  }

  const res = await fetch('/api/tts/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, voice }),
  });

  if (!res.ok) {
    ms.endOfStream();
    URL.revokeObjectURL(url);
    currentAudio = null;
    return;
  }

  const reader = res.body.getReader();

  // Helper: wait until SourceBuffer is not updating
  function waitForSB() {
    return new Promise((resolve) => {
      if (!sb.updating) { resolve(); return; }
      sb.addEventListener('updateend', resolve, { once: true });
    });
  }

  let done = false;
  while (!done) {
    const { value, done: rdDone } = await reader.read();
    done = rdDone;
    if (value && value.byteLength > 0) {
      await waitForSB();
      try {
        sb.appendBuffer(value);
      } catch (e) {
        // QuotaExceededError or similar — abort and fall back to waiting
        console.warn('TTS stream append error:', e);
        break;
      }
    }
  }

  await waitForSB();
  try { ms.endOfStream(); } catch (_) {}

  // Wait for playback to finish
  await new Promise((resolve) => {
    const onEnd = () => { URL.revokeObjectURL(url); resolve(); };
    currentAudio.addEventListener('ended', onEnd, { once: true });
    currentAudio.addEventListener('error', onEnd, { once: true });
    // If audio has already ended before we got here
    if (currentAudio.ended || currentAudio.paused) {
      URL.revokeObjectURL(url);
      resolve();
    }
  });
  currentAudio = null;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function extractSpoken(text) {
  let result = text.replace(/```[\w]*\n[\s\S]*?```/g, '');
  const openIdx = result.indexOf('```');
  if (openIdx !== -1) result = result.slice(0, openIdx);
  return result.replace(/\n{3,}/g, '\n\n').trim();
}

function renderStructured(container, fullText) {
  container.innerHTML = '';
  // Remove tool indicators that were added during streaming
  container.querySelectorAll('.tool-indicator').forEach(el => el.remove());

  const md = document.createElement('div');
  md.className = 'markdown-body';
  md.innerHTML = renderMarkdownSafe(fullText);
  container.appendChild(md);

  // Inject copy buttons & language labels on code blocks
  md.querySelectorAll('pre').forEach(pre => {
    const codeEl = pre.querySelector('code');
    if (!codeEl) return;

    // Language label
    const langClass = [...codeEl.classList].find(c => c.startsWith('language-'));
    const lang = langClass ? langClass.replace('language-', '') : '';

    if (lang && lang !== 'mermaid') {
      const label = document.createElement('span');
      label.className = 'code-lang-label';
      label.textContent = lang;
      pre.appendChild(label);
    }

    // Copy button
    const btn = document.createElement('button');
    btn.className = 'code-copy-btn';
    btn.textContent = '复制';
    btn.addEventListener('click', () => {
      navigator.clipboard.writeText(codeEl.textContent);
      btn.textContent = '已复制';
      setTimeout(() => btn.textContent = '复制', 1500);
    });
    pre.appendChild(btn);
  });

  // Render mermaid diagrams
  renderMermaidBlocks(md);
}

function renderMarkdownSafe(text) {
  if (!text) return '';
  try {
    return marked.parse(text, { breaks: true });
  } catch (e) {
    return escapeHtml(text);
  }
}

let mermaidLoaded = false;
let mermaidLoadPromise = null;

function loadMermaid() {
  if (mermaidLoadPromise) return mermaidLoadPromise;
  mermaidLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement('script');
    script.src = 'https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js';
    script.onload = () => {
      mermaid.initialize({
        startOnLoad: false,
        theme: 'dark',
        themeVariables: {
          darkMode: true,
          background: '#1a1d27',
          primaryColor: '#6c63ff',
          primaryTextColor: '#e4e6ed',
          lineColor: '#8b8fa3',
        },
      });
      mermaidLoaded = true;
      resolve();
    };
    script.onerror = reject;
    document.head.appendChild(script);
  });
  return mermaidLoadPromise;
}

let mermaidCounter = 0;

async function renderMermaidBlocks(container) {
  const mermaidCodes = container.querySelectorAll('code.language-mermaid');
  if (mermaidCodes.length === 0) return;

  await loadMermaid();

  for (const codeEl of mermaidCodes) {
    const pre = codeEl.closest('pre');
    if (!pre) continue;
    const graphDef = codeEl.textContent;
    const wrapper = document.createElement('div');
    wrapper.className = 'mermaid-container';
    const id = `mermaid-${++mermaidCounter}`;
    try {
      const { svg } = await mermaid.render(id, graphDef);
      wrapper.innerHTML = svg;
    } catch (err) {
      console.error('Mermaid render error:', err);
      wrapper.textContent = 'Diagram render error';
      wrapper.style.color = '#ef5350';
    }
    pre.replaceWith(wrapper);
  }
}

// ── Image attachment logic ──

function resizeImage(dataUrl, maxDim = 1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width <= maxDim && height <= maxDim) { resolve(dataUrl); return; }
      const scale = maxDim / Math.max(width, height);
      width = Math.round(width * scale);
      height = Math.round(height * scale);
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      c.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

function updatePreview() {
  previewStrip.innerHTML = '';
  if (pendingImages.length === 0) {
    previewStrip.classList.remove('active');
    return;
  }
  previewStrip.classList.add('active');
  pendingImages.forEach((src, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'preview-thumb';
    const img = document.createElement('img');
    img.src = src;
    wrap.appendChild(img);
    const rm = document.createElement('button');
    rm.className = 'remove-btn';
    rm.textContent = '×';
    rm.addEventListener('click', () => { pendingImages.splice(idx, 1); updatePreview(); });
    wrap.appendChild(rm);
    previewStrip.appendChild(wrap);
  });
}

async function addFiles(files) {
  for (const file of files) {
    if (file.type.startsWith('image/')) {
      const url = await new Promise(r => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result);
        reader.readAsDataURL(file);
      });
      pendingImages.push(await resizeImage(url));
    } else if (file.type.startsWith('video/')) {
      setStatus('提取视频帧...', 'processing');
      const form = new FormData();
      form.append('video', file);
      try {
        const res = await fetch('/api/extract-frames', { method: 'POST', body: form });
        const data = await res.json();
        if (data.frames?.length) pendingImages.push(...data.frames);
        setStatus(`已提取 ${data.frames?.length || 0} 帧`, '');
      } catch (e) {
        setStatus('视频处理失败', '');
        console.error(e);
      }
    }
  }
  updatePreview();
}

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) addFiles(fileInput.files);
  fileInput.value = '';
});

document.addEventListener('paste', e => {
  const items = [...(e.clipboardData?.items || [])];
  const files = items.filter(i => i.type.startsWith('image/') || i.type.startsWith('video/')).map(i => i.getAsFile()).filter(Boolean);
  if (files.length) { e.preventDefault(); addFiles(files); }
});

chatEl.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
chatEl.addEventListener('drop', e => {
  e.preventDefault();
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
  if (files.length) addFiles(files);
});

function showStopBtn(show) {
  stopBtn.style.display = show ? 'flex' : 'none';
  micBtn.style.display = show ? 'none' : 'flex';
}

function stopGeneration() {
  if (abortController) { abortController.abort(); abortController = null; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  ttsQueue = [];
  ttsPlaying = false;
  isGenerating = false;
  showStopBtn(false);
  micBtn.disabled = false;
  textInput.disabled = false;
  updateTextSendBtn();
  setStatus('已停止', '');
}

stopBtn.addEventListener('click', stopGeneration);

clearBtn.addEventListener('click', () => {
  if (isGenerating) stopGeneration();
  // 同时清除 session_id 和聊天记录缓存，刷新后服务端开全新历史
  sessionStorage.removeItem('fenglingSession');
  sessionStorage.removeItem('fenglingHistory');
  location.reload();
});

async function sendMessage(text, doTTS = false, images = []) {
  micBtn.disabled = true;
  textInput.disabled = true;
  textSendBtn.disabled = true;
  isGenerating = true;
  showStopBtn(true);
  const t0 = performance.now();

  addMsg(text, 'user', images, true);
  setStatus('思考中...', 'processing');

  const aiDiv = addMsg('', 'ai', [], false);
  const typingSpan = document.createElement('span');
  typingSpan.className = 'typing';
  aiDiv.appendChild(typingSpan);

  try {
    abortController = new AbortController();
    const payload = { message: text, session_id: sessionId };
    if (images.length) payload.images = images;

    const chatRes = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: abortController.signal,
    });
    await handleChatStream(chatRes, aiDiv, typingSpan, t0, doTTS);
  } catch (err) {
    if (err.name === 'AbortError') return;
    setStatus('出错了: ' + err.message, '');
    console.error(err);
  } finally {
    abortController = null;
    isGenerating = false;
    showStopBtn(false);
    micBtn.disabled = false;
    textInput.disabled = false;
    updateTextSendBtn();
    textInput.focus();
  }
}

function updateTextSendBtn() {
  textSendBtn.disabled = !textInput.value.trim() && pendingImages.length === 0;
}
textInput.addEventListener('input', updateTextSendBtn);

function doTextSend() {
  const text = textInput.value.trim();
  const imgs = [...pendingImages];
  pendingImages = [];
  updatePreview();
  textInput.value = '';
  updateTextSendBtn();
  if (!text && imgs.length === 0) return;
  sendMessage(text || '请看看这些内容', false, imgs);
}

textSendBtn.addEventListener('click', doTextSend);
textInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doTextSend(); }
});

async function handleChatStream(chatRes, aiDiv, typingSpan, t0, doTTS = false) {
  const reader = chatRes.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let buffer = '';
  let spokenCharsSent = 0;
  let doneData = null;
  ttsQueue = [];

  // Debounce: render markdown preview every 500ms during streaming
  let renderTimer = null;
  let lastRenderedLen = 0;

  function schedulePreviewRender() {
    if (renderTimer) return;
    renderTimer = setTimeout(() => {
      renderTimer = null;
      if (fullText.length === lastRenderedLen) return;
      lastRenderedLen = fullText.length;
      // Replace typingSpan content with markdown preview
      typingSpan.innerHTML = renderMarkdownSafe(fullText) + '<span class="cursor">▍</span>';
      chatEl.scrollTop = chatEl.scrollHeight;
    }, 500);
  }

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try {
        const data = JSON.parse(line.slice(6));
        if (data.type === 'text') {
          fullText += data.content;
          // Show raw text immediately for responsiveness, markdown preview via debounce
          typingSpan.textContent = fullText;
          schedulePreviewRender();
          chatEl.scrollTop = chatEl.scrollHeight;
          if (doTTS) {
            const spoken = extractSpoken(fullText);
            const unspoken = spoken.slice(spokenCharsSent);
            const sentences = splitSentences(unspoken);
            if (sentences.length > 1) {
              for (let i = 0; i < sentences.length - 1; i++) {
                if (sentences[i].trim()) {
                  enqueueTTS(sentences[i].trim());
                  spokenCharsSent += sentences[i].length;
                }
              }
            }
          }
          const ms = Math.round(performance.now() - t0);
          setStatus(doTTS ? `朗读中... (${ms}ms)` : `生成中... (${ms}ms)`, 'processing');
        } else if (data.type === 'tool') {
          const label = data.name || 'tool';
          const ti = document.createElement('div');
          ti.className = 'tool-indicator';
          ti.textContent = label;
          aiDiv.insertBefore(ti, typingSpan);
          chatEl.scrollTop = chatEl.scrollHeight;
          const ms = Math.round(performance.now() - t0);
          setStatus(`${label}... (${ms}ms)`, 'processing');

          // Insert task card for create_task tool
          if (data.name === 'create_task') {
            const card = document.createElement('div');
            card.className = 'task-card';
            card.innerHTML = `<span class="task-card-icon">📋</span><span class="task-card-title">已创建任务</span><span class="task-card-arrow">查看 →</span>`;
            card.addEventListener('click', () => window.open('/tasks', '_blank'));
            aiDiv.insertBefore(card, typingSpan);
          }
        } else if (data.type === 'done') {
          doneData = data;
          fullText = data.full_text;
        } else if (data.type === 'error') {
          typingSpan.textContent = '出错了: ' + data.content;
        }
      } catch {}
    }
  }

  // Cancel pending debounce timer
  if (renderTimer) { clearTimeout(renderTimer); renderTimer = null; }

  // Final render with full markdown + copy buttons + mermaid
  renderStructured(aiDiv, fullText);
  if (fullText) {
    chatHistory.push({ text: fullText, role: 'ai' });
    saveChatHistory();
  }

  if (doTTS) {
    const spokenFinal = doneData?.spoken || extractSpoken(fullText);
    const remaining = spokenFinal.slice(spokenCharsSent).trim();
    if (remaining) enqueueTTS(remaining);
    while (ttsPlaying || ttsQueue.length > 0) {
      await new Promise(r => setTimeout(r, 100));
    }
  }

  const totalMs = Math.round(performance.now() - t0);
  setStatus(`准备就绪 (${(totalMs / 1000).toFixed(1)}s)`, '');
}

async function processAudio(blob) {
  setStatus('识别中...', 'processing');
  micBtn.disabled = true;

  try {
    const form = new FormData();
    form.append('audio', blob, 'audio.webm');

    const sttRes = await fetch('/api/stt', { method: 'POST', body: form });
    const sttData = await sttRes.json();
    const userText = sttData.text?.trim();

    if (!userText) {
      setStatus('没有识别到语音，请重试', '');
      micBtn.disabled = false;
      return;
    }

    const imgs = [...pendingImages];
    pendingImages = [];
    updatePreview();

    await sendMessage(userText, true, imgs);
  } catch (err) {
    setStatus('出错了: ' + err.message, '');
    console.error(err);
  }
}

// Load voices from backend
async function loadVoices() {
  try {
    const res = await fetch('/api/voices');
    const data = await res.json();
    const picker = document.getElementById('voice-picker');
    picker.innerHTML = '';

    // Prefer localStorage over server default (server already persists, but localStorage
    // covers the case where the page loads before the server reflects the saved value)
    const saved = localStorage.getItem('tts_voice') || data.current;

    let lastGender = '';
    for (const v of data.voices) {
      if (v.gender !== lastGender) {
        const group = document.createElement('optgroup');
        group.label = v.gender === '女' ? '── 女声 ──' : v.gender === '男' ? '── 男声 ──' : '── 特殊 ──';
        picker.appendChild(group);
        lastGender = v.gender;
      }
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.name} (${v.tag})`;
      if (v.id === saved) opt.selected = true;
      picker.lastElementChild.appendChild(opt);
    }
  } catch (err) {
    console.error('Failed to load voices:', err);
  }
}
loadVoices();

const pushBtn = document.getElementById('push-btn');

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function initPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;

  // iOS 非 standalone 模式：显示一次性提示
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  const isStandalone = window.navigator.standalone;
  if (isIOS && !isStandalone && !sessionStorage.getItem('iosBannerShown')) {
    sessionStorage.setItem('iosBannerShown', '1');
    const banner = document.createElement('div');
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#1a1d27;color:#e4e6ed;padding:12px 16px;font-size:13px;z-index:9999;border-top:1px solid #6c63ff;display:flex;align-items:center;gap:8px;';
    banner.innerHTML = '<span>📲</span><span>在 Safari 中点击「分享」→「添加到主屏幕」以启用推送通知</span><button onclick="this.parentNode.remove()" style="margin-left:auto;background:none;border:none;color:#8b8fa3;cursor:pointer;font-size:18px;">×</button>';
    document.body.appendChild(banner);
  }

  try {
    const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
    await navigator.serviceWorker.ready;

    const existing = await reg.pushManager.getSubscription();
    if (existing) {
      pushBtn.textContent = '🔔';
      pushBtn.title = '已开启推送通知（点击关闭）';
      // 同步到服务器（页面刷新后补齐，幂等）
      fetch('/api/push/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(existing.toJSON()),
      }).catch(() => {});
    }
  } catch (e) {
    console.warn('Service worker registration failed:', e);
  }
}

async function subscribePush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    alert('当前浏览器不支持 Web Push 通知');
    return;
  }

  const reg = await navigator.serviceWorker.ready;
  const existing = await reg.pushManager.getSubscription();

  // 如果已订阅且按钮显示已开启 → 取消订阅
  if (existing && pushBtn.textContent === '🔔') {
    await existing.unsubscribe();
    await fetch('/api/push/subscribe', {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ endpoint: existing.endpoint }),
    });
    pushBtn.textContent = '🔕';
    pushBtn.title = '开启推送通知';
    return;
  }

  // 请求通知权限
  const permission = await Notification.requestPermission();
  if (permission !== 'granted') {
    alert('通知权限被拒绝，请在浏览器设置中允许通知');
    return;
  }

  try {
    // 获取 VAPID public key
    const keyResp = await fetch('/api/push/vapid-public-key');
    const { publicKey } = await keyResp.json();

    // 如果有旧订阅（key 不同或来自别的浏览器），先 unsubscribe 再重新订阅
    if (existing) {
      await existing.unsubscribe();
    }

    // 订阅
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(publicKey),
    });

    // 保存到服务器
    await fetch('/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub.toJSON()),
    });

    pushBtn.textContent = '🔔';
    pushBtn.title = '已开启推送通知（点击关闭）';
  } catch (e) {
    console.error('Push subscription failed:', e.name, e.message, e);
    setStatus('推送订阅失败: ' + e.message, 'error');
  }
}

pushBtn.addEventListener('click', subscribePush);
initPush();

// 服务器主动推送 → 插入对话流（不依赖 Service Worker postMessage）
(function connectNotifyStream() {
  const es = new EventSource('/api/notify-stream');
  es.onmessage = (e) => {
    try {
      const { body } = JSON.parse(e.data);
      if (body) addMsg('🔔 ' + body, 'notify', [], false);  // 不持久化到 chatHistory，避免刷新后重放
    } catch {}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectNotifyStream, 5000);  // 断线重连
  };
})();


if (chatHistory.length > 0) {
  for (const m of chatHistory) {
    addMsg(m.text, m.role, m.images || [], false);
  }
} else {
  addMsg('主人，有什么需要希露菲效劳的吗？', 'ai', [], false);
}
</script>
