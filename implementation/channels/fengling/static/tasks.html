<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务 — Devkit</title>
    <link rel="stylesheet" href="/static/tasks.css">
    <script src="/static/marked.min.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <h1>任务</h1>
            <div class="controls">
                <select id="session-filter">
                    <option value="">所有会话</option>
                </select>
                <button id="btn-refresh" title="刷新">↻ 刷新</button>
            </div>
        </header>
        <main>
            <div id="tree-container"></div>
            <div id="empty-state" class="hidden">暂无任务</div>
        </main>
        <footer id="legend">
            <span class="legend-item"><span class="dot running"></span>running</span>
            <span class="legend-item"><span class="dot completed"></span>completed</span>
            <span class="legend-item"><span class="dot failed"></span>failed</span>
            <span class="legend-item"><span class="dot waiting"></span>waiting</span>
            <span class="legend-item"><span class="dot queued"></span>queued</span>
            <span class="legend-item"><span class="dot cancelled"></span>cancelled</span>
        </footer>
    </div>
    <script src="/static/tasks.js"></script>
</body>
</html>
