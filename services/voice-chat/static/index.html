<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>风铃 · 希露菲</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #242836;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent: #6c63ff;
    --accent-glow: rgba(108, 99, 255, 0.3);
    --user-bubble: #2d3148;
    --ai-bubble: #1e2235;
    --recording: #ff4757;
    --recording-glow: rgba(255, 71, 87, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }

  header {
    padding: 16px 20px;
    text-align: center;
    border-bottom: 1px solid var(--surface-2);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  header .subtitle {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    animation: fadeIn 0.25s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }

  .msg.ai {
    align-self: flex-start;
    background: var(--ai-bubble);
    border-bottom-left-radius: 4px;
    border-left: 2px solid var(--accent);
  }

  .msg.ai .typing {
    display: inline-block;
  }

  .msg.ai .typing::after {
    content: '▍';
    animation: blink 0.8s step-end infinite;
    color: var(--accent);
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .msg .attachment {
    margin-top: 8px;
    background: var(--bg);
    border-radius: 8px;
    padding: 10px 12px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    overflow-x: auto;
    border: 1px solid var(--surface-2);
    position: relative;
  }

  .msg .attachment .att-label {
    position: absolute;
    top: 4px;
    right: 8px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: -apple-system, sans-serif;
    text-transform: uppercase;
    opacity: 0.6;
  }

  .msg .attachment .copy-btn {
    position: absolute;
    top: 4px;
    right: 48px;
    font-size: 11px;
    color: var(--text-dim);
    background: none;
    border: 1px solid var(--surface-2);
    border-radius: 4px;
    padding: 1px 6px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
  }

  .msg .attachment .copy-btn:hover {
    color: var(--text);
    border-color: var(--accent);
  }

  .msg.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 13px;
    padding: 4px 8px;
  }

  #controls {
    flex-shrink: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--surface-2);
    background: var(--surface);
  }

  #status {
    font-size: 13px;
    color: var(--text-dim);
    height: 20px;
    transition: color 0.2s;
  }

  #status.recording { color: var(--recording); }
  #status.processing { color: var(--accent); }

  #mic-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    font-size: 32px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px var(--accent-glow);
    touch-action: none;
    position: relative;
  }

  #mic-btn:active, #mic-btn.recording {
    background: var(--recording);
    box-shadow: 0 4px 30px var(--recording-glow);
    transform: scale(1.1);
  }

  #mic-btn.recording::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid var(--recording);
    animation: pulse 1.2s ease infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  #mic-btn:disabled {
    background: var(--surface-2);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  #mic-btn svg {
    width: 32px;
    height: 32px;
    fill: currentColor;
    pointer-events: none;
  }

  .hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  .voice-select {
    position: absolute;
    top: 16px;
    right: 16px;
  }

  .voice-select select {
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--surface-2);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 12px;
    cursor: pointer;
  }

  .msg img.chat-img {
    max-width: 100%;
    max-height: 240px;
    border-radius: 8px;
    margin-bottom: 6px;
    cursor: pointer;
  }

  #preview-strip {
    display: none;
    padding: 8px 20px 0;
    gap: 8px;
    flex-wrap: wrap;
    background: var(--surface);
    border-top: 1px solid var(--surface-2);
    align-items: center;
  }

  #preview-strip.active { display: flex; }

  .preview-thumb {
    position: relative;
    width: 56px; height: 56px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--surface-2);
  }

  .preview-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .preview-thumb .remove-btn {
    position: absolute;
    top: 2px; right: 2px;
    width: 18px; height: 18px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  #btn-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .side-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: none;
    background: var(--surface-2);
    color: var(--text-dim);
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .side-btn:hover { background: var(--accent); color: #fff; }
  .side-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  @media (max-width: 480px) {
    #mic-btn { width: 72px; height: 72px; }
    .msg { max-width: 88%; font-size: 14px; }
    .side-btn { width: 38px; height: 38px; font-size: 17px; }
  }
</style>
</head>
<body>

<header>
  <h1>🎐 <span>风铃</span></h1>
  <div class="subtitle">按住说话 · 松开发送</div>
</header>

<div class="voice-select">
  <select id="voice-picker"></select>
</div>

<div id="chat"></div>

<div id="preview-strip"></div>

<div id="controls">
  <div id="status">准备就绪</div>
  <div id="btn-row">
    <button class="side-btn" id="attach-btn" aria-label="添加图片/视频" title="添加图片或视频">📎</button>
    <button id="mic-btn" aria-label="按住说话">
      <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
    </button>
    <button class="side-btn" id="send-btn" aria-label="发送" title="发送附件" disabled>➤</button>
  </div>
  <div class="hint">长按说话 · 松开发送 · 可附带图片/视频</div>
  <input type="file" id="file-input" accept="image/*,video/*" multiple hidden>
</div>

<script>
const chatEl = document.getElementById('chat');
const micBtn = document.getElementById('mic-btn');
const statusEl = document.getElementById('status');
const voicePicker = document.getElementById('voice-picker');
const attachBtn = document.getElementById('attach-btn');
const sendBtn = document.getElementById('send-btn');
const fileInput = document.getElementById('file-input');
const previewStrip = document.getElementById('preview-strip');
const sessionId = crypto.randomUUID();

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let currentAudio = null;
let pendingImages = [];

function addMsg(text, role, images = []) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  for (const src of images) {
    const img = document.createElement('img');
    img.src = src;
    img.className = 'chat-img';
    img.addEventListener('click', () => window.open(src, '_blank'));
    div.appendChild(img);
  }
  if (text) {
    const p = document.createElement('p');
    p.style.margin = '0';
    p.textContent = text;
    div.appendChild(p);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

function setStatus(text, cls = '') {
  statusEl.textContent = text;
  statusEl.className = cls;
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, {
      mimeType: MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus' : 'audio/webm'
    });

    mediaRecorder.ondataavailable = e => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.start(100);
    isRecording = true;
    micBtn.classList.add('recording');
    setStatus('🔴 正在录音...', 'recording');
  } catch (err) {
    setStatus('麦克风权限被拒绝', '');
    console.error('Mic error:', err);
  }
}

async function stopRecording() {
  if (!mediaRecorder || !isRecording) return;

  return new Promise(resolve => {
    mediaRecorder.onstop = async () => {
      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      mediaRecorder.stream.getTracks().forEach(t => t.stop());
      mediaRecorder = null;
      isRecording = false;
      micBtn.classList.remove('recording');

      if (blob.size < 1000) {
        setStatus('录音太短，请重试', '');
        resolve();
        return;
      }

      await processAudio(blob);
      resolve();
    };
    mediaRecorder.stop();
  });
}

// Sentence splitter: split on Chinese/English sentence-ending punctuation
const SENTENCE_RE = /[。！？；\n\.!\?;]+/;

function splitSentences(text) {
  const parts = [];
  let rest = text;
  while (rest.length > 0) {
    const m = rest.match(SENTENCE_RE);
    if (!m) break;
    const end = m.index + m[0].length;
    parts.push(rest.slice(0, end));
    rest = rest.slice(end);
  }
  if (rest.trim()) parts.push(rest);
  return parts;
}

// TTS audio queue: play segments sequentially
let ttsQueue = [];
let ttsPlaying = false;

async function enqueueTTS(text) {
  ttsQueue.push(text);
  if (!ttsPlaying) drainTTSQueue();
}

async function drainTTSQueue() {
  ttsPlaying = true;
  while (ttsQueue.length > 0) {
    const text = ttsQueue.shift();
    try {
      await playOneTTS(text);
    } catch (err) {
      console.error('TTS segment error:', err);
    }
  }
  ttsPlaying = false;
}

async function playOneTTS(text) {
  const voice = voicePicker.value;
  const res = await fetch('/api/tts', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ text, voice }),
  });
  if (!res.ok) return;

  const audioBlob = await res.blob();
  const url = URL.createObjectURL(audioBlob);
  currentAudio = new Audio(url);

  await new Promise((resolve, reject) => {
    currentAudio.onended = () => { URL.revokeObjectURL(url); resolve(); };
    currentAudio.onerror = () => { URL.revokeObjectURL(url); resolve(); };
    currentAudio.play().catch(resolve);
  });
  currentAudio = null;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

function extractSpoken(text) {
  let result = text.replace(/```[\w]*\n[\s\S]*?```/g, '');
  const openIdx = result.indexOf('```');
  if (openIdx !== -1) result = result.slice(0, openIdx);
  return result.replace(/\n{3,}/g, '\n\n').trim();
}

function renderStructured(container, fullText) {
  container.innerHTML = '';
  const re = /```(\w*)\n([\s\S]*?)```/g;
  let last = 0, m;

  while ((m = re.exec(fullText)) !== null) {
    const before = fullText.slice(last, m.index).trim();
    if (before) {
      const p = document.createElement('p');
      p.style.margin = '0 0 4px';
      p.textContent = before;
      container.appendChild(p);
    }
    const lang = m[1] || 'code';
    const code = m[2].trim();
    const att = document.createElement('div');
    att.className = 'attachment';
    att.innerHTML =
      `<span class="att-label">${escapeHtml(lang)}</span>` +
      `<button class="copy-btn">复制</button>` +
      `<code>${escapeHtml(code)}</code>`;
    att.querySelector('.copy-btn').addEventListener('click', function() {
      navigator.clipboard.writeText(code);
      this.textContent = '已复制';
      setTimeout(() => this.textContent = '复制', 1500);
    });
    container.appendChild(att);
    last = m.index + m[0].length;
  }

  const rest = fullText.slice(last).trim();
  if (rest) {
    const p = document.createElement('p');
    p.style.margin = last > 0 ? '4px 0 0' : '0';
    p.textContent = rest;
    container.appendChild(p);
  }
}

// ── Image attachment logic ──

function resizeImage(dataUrl, maxDim = 1024) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width <= maxDim && height <= maxDim) { resolve(dataUrl); return; }
      const scale = maxDim / Math.max(width, height);
      width = Math.round(width * scale);
      height = Math.round(height * scale);
      const c = document.createElement('canvas');
      c.width = width; c.height = height;
      c.getContext('2d').drawImage(img, 0, 0, width, height);
      resolve(c.toDataURL('image/jpeg', 0.85));
    };
    img.src = dataUrl;
  });
}

function updatePreview() {
  previewStrip.innerHTML = '';
  if (pendingImages.length === 0) {
    previewStrip.classList.remove('active');
    sendBtn.disabled = true;
    return;
  }
  previewStrip.classList.add('active');
  sendBtn.disabled = false;
  pendingImages.forEach((src, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'preview-thumb';
    const img = document.createElement('img');
    img.src = src;
    wrap.appendChild(img);
    const rm = document.createElement('button');
    rm.className = 'remove-btn';
    rm.textContent = '×';
    rm.addEventListener('click', () => { pendingImages.splice(idx, 1); updatePreview(); });
    wrap.appendChild(rm);
    previewStrip.appendChild(wrap);
  });
}

async function addFiles(files) {
  for (const file of files) {
    if (file.type.startsWith('image/')) {
      const url = await new Promise(r => {
        const reader = new FileReader();
        reader.onload = () => r(reader.result);
        reader.readAsDataURL(file);
      });
      pendingImages.push(await resizeImage(url));
    } else if (file.type.startsWith('video/')) {
      setStatus('提取视频帧...', 'processing');
      const form = new FormData();
      form.append('video', file);
      try {
        const res = await fetch('/api/extract-frames', { method: 'POST', body: form });
        const data = await res.json();
        if (data.frames?.length) pendingImages.push(...data.frames);
        setStatus(`已提取 ${data.frames?.length || 0} 帧`, '');
      } catch (e) {
        setStatus('视频处理失败', '');
        console.error(e);
      }
    }
  }
  updatePreview();
}

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files.length) addFiles(fileInput.files);
  fileInput.value = '';
});

document.addEventListener('paste', e => {
  const items = [...(e.clipboardData?.items || [])];
  const files = items.filter(i => i.type.startsWith('image/') || i.type.startsWith('video/')).map(i => i.getAsFile()).filter(Boolean);
  if (files.length) { e.preventDefault(); addFiles(files); }
});

chatEl.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
chatEl.addEventListener('drop', e => {
  e.preventDefault();
  const files = [...e.dataTransfer.files].filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
  if (files.length) addFiles(files);
});

async function sendWithImages(text = '') {
  const imgs = [...pendingImages];
  pendingImages = [];
  updatePreview();
  micBtn.disabled = true;
  sendBtn.disabled = true;
  const t0 = performance.now();

  addMsg(text, 'user', imgs);
  setStatus('思考中...', 'processing');

  const aiDiv = addMsg('', 'ai');
  const typingSpan = document.createElement('span');
  typingSpan.className = 'typing';
  aiDiv.appendChild(typingSpan);

  try {
    const chatRes = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId, images: imgs }),
    });
    await handleChatStream(chatRes, aiDiv, typingSpan, t0);
  } catch (err) {
    setStatus('出错了: ' + err.message, '');
    console.error(err);
  } finally {
    micBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', () => {
  if (pendingImages.length) sendWithImages('请看看这些内容');
});

async function handleChatStream(chatRes, aiDiv, typingSpan, t0) {
  const reader = chatRes.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let buffer = '';
  let spokenCharsSent = 0;
  let doneData = null;
  ttsQueue = [];

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      try {
        const data = JSON.parse(line.slice(6));
        if (data.type === 'text') {
          fullText += data.content;
          typingSpan.textContent = fullText;
          chatEl.scrollTop = chatEl.scrollHeight;
          const spoken = extractSpoken(fullText);
          const unspoken = spoken.slice(spokenCharsSent);
          const sentences = splitSentences(unspoken);
          if (sentences.length > 1) {
            for (let i = 0; i < sentences.length - 1; i++) {
              if (sentences[i].trim()) {
                enqueueTTS(sentences[i].trim());
                spokenCharsSent += sentences[i].length;
              }
            }
          }
          if (!ttsPlaying) {
            const ms = Math.round(performance.now() - t0);
            setStatus(`朗读中... (总计 ${ms}ms)`, 'processing');
          }
        } else if (data.type === 'done') {
          doneData = data;
          fullText = data.full_text;
        } else if (data.type === 'error') {
          typingSpan.textContent = '出错了: ' + data.content;
        }
      } catch {}
    }
  }

  renderStructured(aiDiv, fullText);
  const spokenFinal = doneData?.spoken || extractSpoken(fullText);
  const remaining = spokenFinal.slice(spokenCharsSent).trim();
  if (remaining) enqueueTTS(remaining);

  while (ttsPlaying || ttsQueue.length > 0) {
    await new Promise(r => setTimeout(r, 100));
  }

  const totalMs = Math.round(performance.now() - t0);
  setStatus(`准备就绪 (${(totalMs / 1000).toFixed(1)}s)`, '');
}

async function processAudio(blob) {
  setStatus('识别中...', 'processing');
  micBtn.disabled = true;
  const t0 = performance.now();

  try {
    const form = new FormData();
    form.append('audio', blob, 'audio.webm');

    const sttRes = await fetch('/api/stt', { method: 'POST', body: form });
    const sttData = await sttRes.json();
    const userText = sttData.text?.trim();
    const sttMs = Math.round(performance.now() - t0);

    if (!userText) {
      setStatus('没有识别到语音，请重试', '');
      micBtn.disabled = false;
      return;
    }

    const imgs = [...pendingImages];
    pendingImages = [];
    updatePreview();

    addMsg(userText, 'user', imgs);
    setStatus(`思考中... (识别 ${sttMs}ms)`, 'processing');

    const aiDiv = addMsg('', 'ai');
    const typingSpan = document.createElement('span');
    typingSpan.className = 'typing';
    aiDiv.appendChild(typingSpan);

    const payload = { message: userText, session_id: sessionId };
    if (imgs.length) payload.images = imgs;

    const chatRes = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    await handleChatStream(chatRes, aiDiv, typingSpan, t0);
  } catch (err) {
    setStatus('出错了: ' + err.message, '');
    console.error(err);
  } finally {
    micBtn.disabled = false;
  }
}

// Push-to-talk: pointer events (mouse + touch)
let holdTimer = null;

micBtn.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (micBtn.disabled) return;
  micBtn.setPointerCapture(e.pointerId);
  startRecording();
});

micBtn.addEventListener('pointerup', e => {
  e.preventDefault();
  if (isRecording) stopRecording();
});

micBtn.addEventListener('pointercancel', e => {
  if (isRecording) stopRecording();
});

// Prevent context menu on long-press (mobile)
micBtn.addEventListener('contextmenu', e => e.preventDefault());

// Keyboard shortcut: hold Space to talk
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat && !isRecording && !micBtn.disabled) {
    e.preventDefault();
    startRecording();
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'Space' && isRecording) {
    e.preventDefault();
    stopRecording();
  }
});

// Load voices from backend
async function loadVoices() {
  try {
    const res = await fetch('/api/voices');
    const data = await res.json();
    const picker = document.getElementById('voice-picker');
    picker.innerHTML = '';

    let lastGender = '';
    for (const v of data.voices) {
      if (v.gender !== lastGender) {
        const group = document.createElement('optgroup');
        group.label = v.gender === '女' ? '── 女声 ──' : v.gender === '男' ? '── 男声 ──' : '── 特殊 ──';
        picker.appendChild(group);
        lastGender = v.gender;
      }
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = `${v.name} (${v.tag})`;
      if (v.id === data.current) opt.selected = true;
      picker.lastElementChild.appendChild(opt);
    }
  } catch (err) {
    console.error('Failed to load voices:', err);
  }
}
loadVoices();

// Welcome message
addMsg('主人，有什么需要希露菲效劳的吗？', 'ai');
