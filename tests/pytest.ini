[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    requires_gateway: needs OpenClaw Gateway running on :18789
    requires_stt: needs Doubao STT Proxy running on :8787
    requires_tts: needs DOUBAO_APPID and DOUBAO_TOKEN env vars
    requires_telegram: needs TELEGRAM_BOT_TOKEN env var
    slow: marks tests as slow (> 10s)
